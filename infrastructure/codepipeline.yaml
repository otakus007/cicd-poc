AWSTemplateFormatVersion: "2010-09-09"
Description: CodePipeline for Per-Project Stack (Nested Stack).

Parameters:
  Environment:
    Type: String
  ProjectName:
    Type: String
  ServiceName:
    Type: String
  CodePipelineRoleArn:
    Type: String
  SourceProjectName:
    Type: String
  SwaggerGenProjectName:
    Type: String
  LintProjectName:
    Type: String
  SecurityScanProjectName:
    Type: String
  BuildProjectName:
    Type: String
  PushProjectName:
    Type: String
  ContractTestProjectName:
    Type: String
  ClusterName:
    Type: String
  EcsServiceName:
    Type: String
  NotificationTopicArn:
    Type: String
    Description: SNS Topic ARN for approval notifications

Conditions:
  IsProduction: !Equals [!Ref Environment, prod]
  IsStaging: !Equals [!Ref Environment, staging]
  IsDevelopment: !Equals [!Ref Environment, dev]
  # Requirement 2.1: Manual approval for prod/staging
  RequiresApproval: !Or [!Condition IsProduction, !Condition IsStaging]
  IsProductionOrStaging: !Or [!Condition IsProduction, !Condition IsStaging]

Resources:
  ArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub ${ProjectName}-${Environment}-${ServiceName}-artifacts-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      LifecycleConfiguration:
        Rules:
          - Id: IntelligentTieringTransition
            Status: Enabled
            Transitions:
              - StorageClass: INTELLIGENT_TIERING
                TransitionInDays: 7
          - Id: CleanupOldArtifacts
            Status: Enabled
            ExpirationInDays: 30
            NoncurrentVersionExpiration:
              NoncurrentDays: 7
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceName

  S3EventBridgeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-${ServiceName}-s3-backup-trigger
      Description: Backup trigger for pipeline on S3 object creation
      State: ENABLED
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - "Object Created"
        detail:
          bucket:
            name:
              - !Ref ArtifactBucket
          object:
            key:
              - prefix: "trigger/"
      Targets:
        - Arn: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Pipeline}
          Id: PipelineTarget
          RoleArn: !GetAtt EventBridgePipelineRole.Arn

  EventBridgePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartPipelineExecution
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: codepipeline:StartPipelineExecution
                Resource: !Sub arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Pipeline}

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-${ServiceName}-pipeline
      RoleArn: !Ref CodePipelineRoleArn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      RestartExecutionOnUpdate: false
      Stages:
        - Name: Source
          Actions:
            - Name: S3Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: S3
                Version: "1"
              Configuration:
                S3Bucket: !Ref ArtifactBucket
                S3ObjectKey: trigger/trigger.zip
                PollForSourceChanges: false
              OutputArtifacts:
                - Name: TriggerOutput
              RunOrder: 1
        - Name: CloneSource
          Actions:
            - Name: CloneRepository
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref SourceProjectName
              InputArtifacts:
                - Name: TriggerOutput
              OutputArtifacts:
                - Name: SourceOutput
              RunOrder: 1
        - Name: SwaggerGen
          Actions:
            - Name: GenerateSpec
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref SwaggerGenProjectName
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: SwaggerGenOutput
              RunOrder: 1
        - Name: Lint
          Actions:
            - Name: APIGovernance
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref LintProjectName
              InputArtifacts:
                - Name: SwaggerGenOutput
              OutputArtifacts:
                - Name: LintOutput
              RunOrder: 1
        - Name: SecurityScan
          Actions:
            - Name: VulnerabilityScan
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref SecurityScanProjectName
              InputArtifacts:
                - Name: SwaggerGenOutput
              OutputArtifacts:
                - Name: SecurityScanOutput
              RunOrder: 1
        - Name: Build
          Actions:
            - Name: BuildAndPush
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref BuildProjectName
              InputArtifacts:
                - Name: SwaggerGenOutput
              OutputArtifacts:
                - Name: BuildOutput
              RunOrder: 1
        - Name: ContractTest
          Actions:
            - Name: DreddContractTest
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref ContractTestProjectName
              InputArtifacts:
                - Name: SwaggerGenOutput
              OutputArtifacts:
                - Name: ContractTestOutput
              RunOrder: 1
        - Name: Approval
          # Only require manual approval for production/staging
          Actions:
            - !If
              - RequiresApproval
              - Name: ManualApproval
                ActionTypeId:
                  Category: Approval
                  Owner: AWS
                  Provider: Manual
                  Version: "1"
                Configuration:
                  NotificationArn: !Ref NotificationTopicArn
                  CustomData: !Sub "Approve deployment of ${ServiceName} to ${Environment}"
                RunOrder: 1
              - Name: AutoApproval
                ActionTypeId:
                  Category: Build
                  Owner: AWS
                  Provider: CodeBuild
                  Version: "1"
                Configuration:
                  # Use any existing project as a no-op or a dedicated no-op project
                  ProjectName: !Ref LintProjectName
                InputArtifacts:
                  - Name: SourceOutput
                RunOrder: 1
        - Name: Deploy
          Actions:
            - Name: DeployToECS
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: ECS
                Version: "1"
              Configuration:
                ClusterName: !Ref ClusterName
                ServiceName: !Ref EcsServiceName
                FileName: imagedefinitions.json
              InputArtifacts:
                - Name: BuildOutput
              RunOrder: 1
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceName

Outputs:
  PipelineName:
    Value: !Ref Pipeline
  ArtifactBucketName:
    Value: !Ref ArtifactBucket
