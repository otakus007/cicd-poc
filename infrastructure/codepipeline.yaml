AWSTemplateFormatVersion: "2010-09-09"
Description: CodePipeline for Per-Project Stack (Nested Stack).

Parameters:
  Environment:
    Type: String
  ProjectName:
    Type: String
  ServiceName:
    Type: String
  CodePipelineRoleArn:
    Type: String
  SourceProjectName:
    Type: String
  SwaggerGenProjectName:
    Type: String
  LintProjectName:
    Type: String
  BuildProjectName:
    Type: String
  PushProjectName:
    Type: String
  ContractTestProjectName:
    Type: String
  ClusterName:
    Type: String
  EcsServiceName:
    Type: String

Resources:
  ArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub ${ProjectName}-${Environment}-${ServiceName}-artifacts-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: CleanupOldArtifacts
            Status: Enabled
            ExpirationInDays: 30
            NoncurrentVersionExpiration:
              NoncurrentDays: 7
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceName

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-${ServiceName}-pipeline
      RoleArn: !Ref CodePipelineRoleArn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      RestartExecutionOnUpdate: false
      Stages:
        - Name: Source
          Actions:
            - Name: S3Source
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: S3
                Version: "1"
              Configuration:
                S3Bucket: !Ref ArtifactBucket
                S3ObjectKey: trigger/trigger.zip
                PollForSourceChanges: false
              OutputArtifacts:
                - Name: TriggerOutput
              RunOrder: 1
        - Name: CloneSource
          Actions:
            - Name: CloneRepository
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref SourceProjectName
              InputArtifacts:
                - Name: TriggerOutput
              OutputArtifacts:
                - Name: SourceOutput
              RunOrder: 1
        - Name: SwaggerGen
          Actions:
            - Name: GenerateSpec
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref SwaggerGenProjectName
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: SwaggerGenOutput
              RunOrder: 1
        - Name: Lint
          Actions:
            - Name: APIGovernance
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref LintProjectName
              InputArtifacts:
                - Name: SwaggerGenOutput
              OutputArtifacts:
                - Name: LintOutput
              RunOrder: 1
        - Name: Build
          Actions:
            - Name: BuildAndTest
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref BuildProjectName
              InputArtifacts:
                - Name: SwaggerGenOutput
              OutputArtifacts:
                - Name: BuildOutput
              RunOrder: 1
        - Name: Push
          Actions:
            - Name: PushToECR
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref PushProjectName
              InputArtifacts:
                - Name: BuildOutput
              OutputArtifacts:
                - Name: PushOutput
              RunOrder: 1
        - Name: Deploy
          Actions:
            - Name: DeployToECS
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: ECS
                Version: "1"
              Configuration:
                ClusterName: !Ref ClusterName
                ServiceName: !Ref EcsServiceName
                FileName: imagedefinitions.json
              InputArtifacts:
                - Name: PushOutput
              RunOrder: 1
        - Name: ContractTest
          Actions:
            - Name: DreddContractTest
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref ContractTestProjectName
              InputArtifacts:
                - Name: SwaggerGenOutput
              OutputArtifacts:
                - Name: ContractTestOutput
              RunOrder: 1
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceName

Outputs:
  PipelineName:
    Value: !Ref Pipeline
  ArtifactBucketName:
    Value: !Ref ArtifactBucket
