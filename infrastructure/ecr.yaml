AWSTemplateFormatVersion: "2010-09-09"
Description: ECR Repository Stack for CI/CD Pipeline (Per-Project Nested Stack).

Parameters:
  Environment:
    Type: String
  ProjectName:
    Type: String
  ServiceName:
    Type: String

Resources:
  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-${Environment}-${ServiceName}
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 10 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":10},"action":{"type":"expire"}}]}
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceName

Outputs:
  RepositoryUri:
    Value: !GetAtt EcrRepository.RepositoryUri
  RepositoryName:
    Value: !Ref EcrRepository
