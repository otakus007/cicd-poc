AWSTemplateFormatVersion: "2010-09-09"
Description: ECS Service, Target Group, and Listener Rule (Per-Project Nested Stack).

Parameters:
  Environment:
    Type: String
  ProjectName:
    Type: String
  ServiceName:
    Type: String
  VpcId:
    Type: String
  PrivateSubnet1Id:
    Type: String
  PrivateSubnet2Id:
    Type: String
  EcsSecurityGroupId:
    Type: String
  ClusterArn:
    Type: String
  TaskDefinitionArn:
    Type: String
  HttpListenerArn:
    Type: String
  PathPattern:
    Type: String
  ListenerRulePriority:
    Type: Number
  ContainerPort:
    Type: Number
  DesiredCount:
    Type: Number
  HealthCheckPath:
    Type: String
  HealthCheckGracePeriod:
    Type: Number
  MinTaskCount:
    Type: Number
    Default: 1
    Description: Minimum number of ECS tasks for auto-scaling
  MaxTaskCount:
    Type: Number
    Default: 4
    Description: Maximum number of ECS tasks for auto-scaling
  EnableServiceConnect:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable ECS Service Connect for service-to-service communication (opt-out for dev)
  EnableExecuteCommand:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable ECS Exec for interactive debugging (true for dev/staging, false for prod)
  ServiceConnectNamespace:
    Type: String
    Default: ""
    Description: Cloud Map namespace ARN for Service Connect

Conditions:
  IsProduction: !Equals [!Ref Environment, prod]
  IsDevelopment: !Equals [!Ref Environment, dev]
  IsServiceConnectEnabled: !Equals [!Ref EnableServiceConnect, "true"]

Resources:
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-${ServiceName}-tg
      Protocol: HTTP
      Port: !Ref ContainerPort
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckPath: !Ref HealthCheckPath
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      HealthCheckTimeoutSeconds: 5
      Matcher:
        HttpCode: "200"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceName
        - Key: ComputeType
          Value: fargate

  ListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListenerArn
      Priority: !Ref ListenerRulePriority
      Conditions:
        - Field: path-pattern
          Values:
            - !Ref PathPattern
      Actions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  EcsService:
    Type: AWS::ECS::Service
    DependsOn: ListenerRule
    Properties:
      ServiceName: !Sub ${ProjectName}-${Environment}-${ServiceName}-svc
      Cluster: !Ref ClusterArn
      TaskDefinition: !Ref TaskDefinitionArn
      DesiredCount: !Ref DesiredCount
      HealthCheckGracePeriodSeconds: !Ref HealthCheckGracePeriod
      LaunchType: FARGATE
      EnableExecuteCommand: !If [IsProduction, false, true]
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1Id
            - !Ref PrivateSubnet2Id
          SecurityGroups:
            - !Ref EcsSecurityGroupId
      LoadBalancers:
        - ContainerName: !Sub ${ServiceName}-container
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroup
      ServiceConnectConfiguration:
        !If
          - IsServiceConnectEnabled
          - Enabled: true
            Namespace: !Ref ServiceConnectNamespace
            Services:
              - PortName: !Sub ${ServiceName}-port
                ClientAliases:
                  - Port: !Ref ContainerPort
                    DnsName: !Sub "${ServiceName}"
          - Enabled: false
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceName
        - Key: ComputeType
          Value: fargate

  ScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      ServiceNamespace: ecs
      ScalableDimension: ecs:service:DesiredCount
      ResourceId: !Join
        - /
        - - service
          - !Select [1, !Split ["/", !Ref ClusterArn]]
          - !GetAtt EcsService.Name
      MinCapacity: !If [IsDevelopment, 1, 2]
      MaxCapacity: !Ref MaxTaskCount

  CpuScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub ${ProjectName}-${Environment}-${ServiceName}-cpu-scaling
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

Outputs:
  ServiceName:
    Value: !GetAtt EcsService.Name
  TargetGroupArn:
    Value: !Ref TargetGroup
  ScalableTargetArn:
    Value: !Ref ScalableTarget
    Export:
      Name: !Sub ${ProjectName}-${Environment}-${ServiceName}-ScalableTargetArn
