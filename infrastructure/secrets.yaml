AWSTemplateFormatVersion: "2010-09-09"
Description: Secrets Manager Stack for CI/CD Pipeline (Per-Project Nested Stack).

Parameters:
  Environment:
    Type: String
  ProjectName:
    Type: String
  ServiceName:
    Type: String

Resources:
  PatSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${ProjectName}/${Environment}/${ServiceName}/azure-devops-pat
      Description: !Sub "Azure DevOps PAT for ${ServiceName}"
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceName

  DbSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${ProjectName}/${Environment}/${ServiceName}/db/connection-strings
      Description: !Sub "Database connection strings for ${ServiceName}"
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceName

Outputs:
  PatSecretArn:
    Value: !Ref PatSecret
  DbSecretArn:
    Value: !Ref DbSecret
