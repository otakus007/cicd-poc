AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Per-Project Stack for Multi-Service Platform (Nested Architecture) - EC2 variant.
  Deploys a new project (pipeline + service) on top of shared EC2 infrastructure.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  InfraProjectName:
    Type: String
    Default: japfa-api
  ServiceName:
    Type: String
    AllowedPattern: ^[a-z0-9][a-z0-9-]*[a-z0-9]$
    MinLength: 3
    MaxLength: 32
  AzureDevOpsOrganization:
    Type: String
    MinLength: 1
  AzureDevOpsProject:
    Type: String
    MinLength: 1
  AzureDevOpsRepository:
    Type: String
    MinLength: 1
  BranchName:
    Type: String
    Default: main
  PathPattern:
    Type: String
    Default: /api/*
  ListenerRulePriority:
    Type: Number
    Default: 100
  ContainerCpu:
    Type: String
    Default: "512"
  ContainerMemory:
    Type: String
    Default: "1024"
  DesiredCount:
    Type: Number
    Default: 0
  ContainerPort:
    Type: Number
    Default: 80
  HealthCheckGracePeriod:
    Type: Number
    Default: 120
  TemplatesBucketName:
    Type: String
  TemplatesBucketPrefix:
    Type: String
    Default: infrastructure
  HealthCheckPath:
    Type: String
    Default: /health
  PathBase:
    Type: String
    Default: ""

Resources:
  EcrStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${TemplatesBucketName}.s3.${AWS::Region}.amazonaws.com/${TemplatesBucketPrefix}/ecr.yaml
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref InfraProjectName
        ServiceName: !Ref ServiceName

  SecretsStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${TemplatesBucketName}.s3.${AWS::Region}.amazonaws.com/${TemplatesBucketPrefix}/secrets.yaml
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref InfraProjectName
        ServiceName: !Ref ServiceName

  TaskDefinitionStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${TemplatesBucketName}.s3.${AWS::Region}.amazonaws.com/${TemplatesBucketPrefix}/task-definition-ec2.yaml
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref InfraProjectName
        ServiceName: !Ref ServiceName
        ContainerCpu: !Ref ContainerCpu
        ContainerMemory: !Ref ContainerMemory
        ContainerPort: !Ref ContainerPort
        PathBase: !Ref PathBase
        ExecutionRoleArn:
          Fn::ImportValue: !Sub ${InfraProjectName}-${Environment}-EcsExecutionRoleArn
        TaskRoleArn:
          Fn::ImportValue: !Sub ${InfraProjectName}-${Environment}-EcsTaskRoleArn
        ContainerImage: "public.ecr.aws/nginx/nginx:alpine"

  EcsServiceStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: TaskDefinitionStack
    Properties:
      TemplateURL: !Sub https://${TemplatesBucketName}.s3.${AWS::Region}.amazonaws.com/${TemplatesBucketPrefix}/ecs-ec2-service.yaml
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref InfraProjectName
        ServiceName: !Ref ServiceName
        VpcId:
          Fn::ImportValue: !Sub ${InfraProjectName}-${Environment}-ec2-VpcId
        PrivateSubnet1Id:
          Fn::ImportValue: !Sub ${InfraProjectName}-${Environment}-ec2-PrivateSubnet1Id
        PrivateSubnet2Id:
          Fn::ImportValue: !Sub ${InfraProjectName}-${Environment}-ec2-PrivateSubnet2Id
        EcsSecurityGroupId:
          Fn::ImportValue: !Sub ${InfraProjectName}-${Environment}-ec2-EcsSecurityGroupId
        ClusterArn:
          Fn::ImportValue: !Sub ${InfraProjectName}-${Environment}-Ec2ClusterArn
        TaskDefinitionArn: !GetAtt TaskDefinitionStack.Outputs.TaskDefinitionArn
        HttpListenerArn:
          Fn::ImportValue: !Sub ${InfraProjectName}-${Environment}-ec2-HttpListenerArn
        PathPattern: !Ref PathPattern
        ListenerRulePriority: !Ref ListenerRulePriority
        ContainerPort: !Ref ContainerPort
        DesiredCount: !Ref DesiredCount
        HealthCheckPath: !Ref HealthCheckPath
        HealthCheckGracePeriod: !Ref HealthCheckGracePeriod
        CapacityProviderName:
          Fn::ImportValue: !Sub ${InfraProjectName}-${Environment}-Ec2CapacityProviderName

  CodeBuildStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub https://${TemplatesBucketName}.s3.${AWS::Region}.amazonaws.com/${TemplatesBucketPrefix}/codebuild.yaml
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref InfraProjectName
        ServiceName: !Ref ServiceName
        CodeBuildRoleArn:
          Fn::ImportValue: !Sub ${InfraProjectName}-${Environment}-ec2-CodeBuildRoleArn
        VpcId:
          Fn::ImportValue: !Sub ${InfraProjectName}-${Environment}-ec2-VpcId
        PrivateSubnet1Id:
          Fn::ImportValue: !Sub ${InfraProjectName}-${Environment}-ec2-PrivateSubnet1Id
        PrivateSubnet2Id:
          Fn::ImportValue: !Sub ${InfraProjectName}-${Environment}-ec2-PrivateSubnet2Id
        CodeBuildSecurityGroupId:
          Fn::ImportValue: !Sub ${InfraProjectName}-${Environment}-ec2-CodeBuildSecurityGroupId
        AzureDevOpsOrganization: !Ref AzureDevOpsOrganization
        AzureDevOpsProject: !Ref AzureDevOpsProject
        AzureDevOpsRepository: !Ref AzureDevOpsRepository
        BranchName: !Ref BranchName
        NotificationTopicArn:
          Fn::ImportValue: !Sub ${InfraProjectName}-${Environment}-ec2-NotificationTopicArn
        ApiGatewayEndpoint:
          Fn::ImportValue: !Sub ${InfraProjectName}-${Environment}-ec2-ApiGatewayEndpoint
        EcrRepositoryUri: !GetAtt EcrStack.Outputs.RepositoryUri

  CodePipelineStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - CodeBuildStack
      - EcsServiceStack
    Properties:
      TemplateURL: !Sub https://${TemplatesBucketName}.s3.${AWS::Region}.amazonaws.com/${TemplatesBucketPrefix}/codepipeline.yaml
      Parameters:
        Environment: !Ref Environment
        ProjectName: !Ref InfraProjectName
        ServiceName: !Ref ServiceName
        CodePipelineRoleArn:
          Fn::ImportValue: !Sub ${InfraProjectName}-${Environment}-ec2-CodePipelineRoleArn
        SourceProjectName: !GetAtt CodeBuildStack.Outputs.SourceProjectName
        SwaggerGenProjectName: !GetAtt CodeBuildStack.Outputs.SwaggerGenProjectName
        LintProjectName: !GetAtt CodeBuildStack.Outputs.LintProjectName
        BuildProjectName: !GetAtt CodeBuildStack.Outputs.BuildProjectName
        PushProjectName: !GetAtt CodeBuildStack.Outputs.PushProjectName
        ContractTestProjectName: !GetAtt CodeBuildStack.Outputs.ContractTestProjectName
        ClusterName:
          Fn::ImportValue: !Sub ${InfraProjectName}-${Environment}-Ec2ClusterName
        EcsServiceName: !GetAtt EcsServiceStack.Outputs.ServiceName

Outputs:
  ServiceName:
    Value: !Ref ServiceName
  EcrRepositoryUri:
    Value: !GetAtt EcrStack.Outputs.RepositoryUri
  PipelineName:
    Value: !GetAtt CodePipelineStack.Outputs.PipelineName
  EcsServiceName:
    Value: !GetAtt EcsServiceStack.Outputs.ServiceName
  TargetGroupArn:
    Value: !GetAtt EcsServiceStack.Outputs.TargetGroupArn
  ArtifactBucketName:
    Value: !GetAtt CodePipelineStack.Outputs.ArtifactBucketName
  PatSecretArn:
    Value: !GetAtt SecretsStack.Outputs.PatSecretArn
  DbSecretArn:
    Value: !GetAtt SecretsStack.Outputs.DbSecretArn
