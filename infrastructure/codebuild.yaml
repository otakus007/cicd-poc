AWSTemplateFormatVersion: "2010-09-09"
Description: CodeBuild projects for Per-Project Stack (Nested Stack).

Parameters:
  Environment:
    Type: String
  ProjectName:
    Type: String
  ServiceName:
    Type: String
  CodeBuildRoleArn:
    Type: String
  VpcId:
    Type: String
  PrivateSubnet1Id:
    Type: String
  PrivateSubnet2Id:
    Type: String
  CodeBuildSecurityGroupId:
    Type: String
  AzureDevOpsOrganization:
    Type: String
  AzureDevOpsProject:
    Type: String
  AzureDevOpsRepository:
    Type: String
  BranchName:
    Type: String
  NotificationTopicArn:
    Type: String
  ApiGatewayEndpoint:
    Type: String
  EcrRepositoryUri:
    Type: String

Conditions:
  IsProduction: !Equals [!Ref Environment, prod]
  IsStaging: !Equals [!Ref Environment, staging]
  IsDevelopment: !Equals [!Ref Environment, dev]

Resources:
  SourceBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/codebuild/${ProjectName}-${Environment}-${ServiceName}-source
      KmsKeyId: !If [IsProduction, !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/cloudwatch", !Ref "AWS::NoValue"]
      RetentionInDays: !If [IsProduction, 90, 14]

  SourceProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-${ServiceName}-source
      ServiceRole: !Ref CodeBuildRoleArn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: false
        EnvironmentVariables:
          - Name: AZURE_DEVOPS_ORGANIZATION
            Value: !Ref AzureDevOpsOrganization
          - Name: AZURE_DEVOPS_PROJECT
            Value: !Ref AzureDevOpsProject
          - Name: AZURE_DEVOPS_REPOSITORY
            Value: !Ref AzureDevOpsRepository
          - Name: BRANCH_NAME
            Value: !Ref BranchName
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: SERVICE_NAME
            Value: !Ref ServiceName
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspecs/buildspec-source.yml
      VpcConfig:
        VpcId: !Ref VpcId
        Subnets:
          - !Ref PrivateSubnet1Id
          - !Ref PrivateSubnet2Id
        SecurityGroupIds:
          - !Ref CodeBuildSecurityGroupId
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref SourceBuildLogGroup
      TimeoutInMinutes: 15
      ConcurrentBuildLimit: !If [IsDevelopment, 1, !Ref "AWS::NoValue"]

  SwaggerGenLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/codebuild/${ProjectName}-${Environment}-${ServiceName}-swagger-gen
      KmsKeyId: !If [IsProduction, !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/cloudwatch", !Ref "AWS::NoValue"]
      RetentionInDays: !If [IsProduction, 90, 14]

  SwaggerGenProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-${ServiceName}-swagger-gen
      ServiceRole: !Ref CodeBuildRoleArn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: false
        EnvironmentVariables:
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: SERVICE_NAME
            Value: !Ref ServiceName
          - Name: OPENAPI_SPEC_PATH
            Value: ""
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspecs/buildspec-swagger-gen.yml
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref SwaggerGenLogGroup
      TimeoutInMinutes: 15
      ConcurrentBuildLimit: !If [IsDevelopment, 1, !Ref "AWS::NoValue"]

  LintLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/codebuild/${ProjectName}-${Environment}-${ServiceName}-lint
      KmsKeyId: !If [IsProduction, !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/cloudwatch", !Ref "AWS::NoValue"]
      RetentionInDays: !If [IsProduction, 90, 14]

  LintProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-${ServiceName}-lint
      ServiceRole: !Ref CodeBuildRoleArn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: false
        EnvironmentVariables:
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: SERVICE_NAME
            Value: !Ref ServiceName
          - Name: OPENAPI_SPEC_PATH
            Value: ""
          - Name: SNS_TOPIC_ARN
            Value: !Ref NotificationTopicArn
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspecs/buildspec-lint.yml
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref LintLogGroup
      TimeoutInMinutes: 10
      ConcurrentBuildLimit: !If [IsDevelopment, 1, !Ref "AWS::NoValue"]

  SecurityScanLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/codebuild/${ProjectName}-${Environment}-${ServiceName}-security-scan
      KmsKeyId: !If [IsProduction, !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/cloudwatch", !Ref "AWS::NoValue"]
      RetentionInDays: !If [IsProduction, 90, 14]

  SecurityScanProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-${ServiceName}-security-scan
      ServiceRole: !Ref CodeBuildRoleArn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: SERVICE_NAME
            Value: !Ref ServiceName
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: AWS_REGION
            Value: !Ref AWS::Region
          - Name: ECR_REPO
            Value: !Ref EcrRepositoryUri
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspecs/buildspec-security-scan.yml
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref SecurityScanLogGroup
      TimeoutInMinutes: 15
      ConcurrentBuildLimit: !If [IsDevelopment, 1, !Ref "AWS::NoValue"]

  BuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/codebuild/${ProjectName}-${Environment}-${ServiceName}-build
      KmsKeyId: !If [IsProduction, !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/cloudwatch", !Ref "AWS::NoValue"]
      RetentionInDays: !If [IsProduction, 90, 14]

  BuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-${ServiceName}-build
      ServiceRole: !Ref CodeBuildRoleArn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: SERVICE_NAME
            Value: !Ref ServiceName
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: AWS_REGION
            Value: !Ref AWS::Region
          - Name: ECR_REPO
            Value: !Ref EcrRepositoryUri
      Cache:
        Type: LOCAL
        Modes:
          - LOCAL_DOCKER_LAYER_CACHE
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspecs/buildspec-build.yml
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref BuildLogGroup
      TimeoutInMinutes: 30
      ConcurrentBuildLimit: !If [IsDevelopment, 1, !Ref "AWS::NoValue"]

  ContractTestLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/codebuild/${ProjectName}-${Environment}-${ServiceName}-contract-test
      KmsKeyId: !If [IsProduction, !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/cloudwatch", !Ref "AWS::NoValue"]
      RetentionInDays: !If [IsProduction, 90, 14]

  ContractTestProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-${ServiceName}-contract-test
      ServiceRole: !Ref CodeBuildRoleArn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: false
        EnvironmentVariables:
          - Name: PROJECT_NAME
            Value: !Ref ProjectName
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: SERVICE_NAME
            Value: !Ref ServiceName
          - Name: API_GATEWAY_ENDPOINT
            Value: !Ref ApiGatewayEndpoint
          - Name: OPENAPI_SPEC_PATH
            Value: ""
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspecs/buildspec-contract-test.yml
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref ContractTestLogGroup
      TimeoutInMinutes: 15
      ConcurrentBuildLimit: !If [IsDevelopment, 1, !Ref "AWS::NoValue"]

Outputs:
  SourceProjectName:
    Value: !Ref SourceProject
  SwaggerGenProjectName:
    Value: !Ref SwaggerGenProject
  LintProjectName:
    Value: !Ref LintProject
  SecurityScanProjectName:
    Value: !Ref SecurityScanProject
  BuildProjectName:
    Value: !Ref BuildProject
  ContractTestProjectName:
    Value: !Ref ContractTestProject
