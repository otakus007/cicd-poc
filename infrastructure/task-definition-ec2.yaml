AWSTemplateFormatVersion: "2010-09-09"
Description: Task Definition for Per-Project Stack EC2 (Nested Stack).

Parameters:
  Environment:
    Type: String
  ProjectName:
    Type: String
  ServiceName:
    Type: String
  ContainerCpu:
    Type: String
  ContainerMemory:
    Type: String
  ContainerPort:
    Type: Number
  ExecutionRoleArn:
    Type: String
  TaskRoleArn:
    Type: String
  PathBase:
    Type: String
  ContainerImage:
    Type: String

Resources:
  ServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}-${Environment}-${ServiceName}-ec2
      RetentionInDays: 30

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-${Environment}-${ServiceName}-ec2
      NetworkMode: awsvpc
      RequiresCompatibilities: [EC2]
      Cpu: !Ref ContainerCpu
      Memory: !Ref ContainerMemory
      ExecutionRoleArn: !Ref ExecutionRoleArn
      TaskRoleArn: !Ref TaskRoleArn
      ContainerDefinitions:
        - Name: !Sub ${ServiceName}-container
          Image: !Ref ContainerImage
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ServiceLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          Environment:
            - Name: ASPNETCORE_ENVIRONMENT
              Value: !Ref Environment
            - Name: SERVICE_NAME
              Value: !Ref ServiceName
            - Name: PATH_BASE
              Value: !Ref PathBase
          Cpu: 0
          MemoryReservation: 512
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Service
          Value: !Ref ServiceName
        - Key: ComputeType
          Value: ec2

Outputs:
  TaskDefinitionArn:
    Value: !Ref TaskDefinition
