# buildspec-push.yml — Generic ECR Push
# ============================================================================
# Generic buildspec that works for ANY project. Reuses the Docker image built
# in the Build stage (via image-metadata.json artifact), tags it for ECR,
# and pushes. Outputs imagedefinitions.json for ECS.
#
# Injected env vars (from project.yaml CodeBuild config):
#   AWS_ACCOUNT_ID, AWS_REGION, ECR_REPO, SERVICE_NAME, ENVIRONMENT
#
# Expects Build stage artifacts to include image-metadata.json with:
#   { "imageName", "commitSha", "shortSha", "ecrUri" }
# ============================================================================

version: 0.2

phases:
  pre_build:
    commands:
      - echo "Authenticating with Amazon ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - echo "ECR authentication successful"

      # Resolve image tag from Build stage metadata or fallback
      - |
        IMAGE_TAG=""
        if [ -f image-metadata.json ]; then
          IMAGE_TAG=$(python3 -c "import json; print(json.load(open('image-metadata.json'))['shortSha'])" 2>/dev/null || true)
        fi
        if [ -z "$IMAGE_TAG" ] && [ -n "${CODEBUILD_RESOLVED_SOURCE_VERSION}" ]; then
          IMAGE_TAG=$(echo "${CODEBUILD_RESOLVED_SOURCE_VERSION}" | cut -c1-8)
        fi
        if [ -z "$IMAGE_TAG" ]; then
          IMAGE_TAG="b$(date +%Y%m%d%H%M%S)"
        fi
        export IMAGE_TAG
      - 'echo "Image tag: $IMAGE_TAG"'

  build:
    commands:
      - ECR_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO

      # Pull the image built in the Build stage from ECR instead of rebuilding
      - echo "Pulling Docker image from Build stage..."
      - docker pull $ECR_URI:$IMAGE_TAG

      # Tag for push
      - docker tag $ECR_URI:$IMAGE_TAG $ECR_URI:latest

      - echo "Pushing Docker image tags to ECR..."
      - docker push $ECR_URI:$IMAGE_TAG
      - docker push $ECR_URI:latest
      - echo "Docker images pushed to ECR"

  post_build:
    commands:
      - ECR_IMAGE=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG
      # Container name matches ECS task definition: ${ServiceName}-container
      - printf '[{"name":"%s-container","imageUri":"%s"}]' "$SERVICE_NAME" "$ECR_IMAGE" > imagedefinitions.json
      - 'echo "Image: $(cat imagedefinitions.json)"'

artifacts:
  files:
    - imagedefinitions.json
