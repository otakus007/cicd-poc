version: 0.2

env:
  variables:
    IMAGE_NAME: "${SERVICE_NAME}"

phases:
  pre_build:
    commands:
      - echo "============================================"
      - 'echo "Build Stage: ${SERVICE_NAME}"'
      - echo "============================================"
      - DOCKERFILE_PATH="${DOCKERFILE_PATH:-Dockerfile}"
      - |
        if [ ! -f "$DOCKERFILE_PATH" ]; then
          echo "ERROR: Dockerfile not found at $DOCKERFILE_PATH"
          exit 1
        fi
      - |
        if [ -n "${CODEBUILD_RESOLVED_SOURCE_VERSION}" ]; then
          COMMIT_SHA="${CODEBUILD_RESOLVED_SOURCE_VERSION}"
        else
          COMMIT_SHA="build-$(date +%Y%m%d%H%M%S)"
        fi
      - SHORT_SHA="${COMMIT_SHA:0:8}"
      - 'echo "Commit: ${SHORT_SHA}"'

  build:
    commands:
      - echo "Build phase - preparing for Docker build..."

  post_build:
    commands:
      - echo "Building and Pushing Docker image..."
      - |
        docker build \
          -t "${IMAGE_NAME}:${COMMIT_SHA}" \
          -t "${IMAGE_NAME}:${SHORT_SHA}" \
          -t "${IMAGE_NAME}:latest" \
          -f "$DOCKERFILE_PATH" \
          .
      - ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}"
      - aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
      - docker tag "${IMAGE_NAME}:${COMMIT_SHA}" "${ECR_URI}:${COMMIT_SHA}"
      - docker tag "${IMAGE_NAME}:${SHORT_SHA}" "${ECR_URI}:${SHORT_SHA}"
      - docker tag "${IMAGE_NAME}:latest" "${ECR_URI}:latest"
      - docker push "${ECR_URI}:${COMMIT_SHA}"
      - docker push "${ECR_URI}:${SHORT_SHA}"
      - docker push "${ECR_URI}:latest"
      - printf '[{"name":"%s-container","imageUri":"%s"}]' "$SERVICE_NAME" "$ECR_URI:$SHORT_SHA" > imagedefinitions.json
      - |
        cat > image-metadata.json << EOF
        {
          "imageName": "${IMAGE_NAME}",
          "commitSha": "${COMMIT_SHA}",
          "shortSha": "${SHORT_SHA}",
          "ecrUri": "${ECR_URI}"
        }
        EOF

artifacts:
  files:
    - imagedefinitions.json

secondary-artifacts:
  image-metadata:
    files:
      - image-metadata.json
